# SubGrab AI Engine Configuration
# ─────────────────────────────────────────────────────────────────────────────
# Set api_key for each engine you want to enable.
# Leave api_key blank (or remove the section) to skip that engine.
# CLI flags --openrouter-key / --grok-key override these values.
# ─────────────────────────────────────────────────────────────────────────────

[openrouter]
api_key =
# model options: anthropic/claude-sonnet-4-5, anthropic/claude-opus-4,
#                anthropic/claude-haiku-4-5, anthropic/claude-3.5-sonnet,
#                openai/gpt-4o, openai/o3-mini, openai/o4-mini,
#                google/gemini-2.0-flash, meta-llama/llama-3.3-70b-instruct,
#                deepseek/deepseek-r1
model = anthropic/claude-sonnet-4-5

[grok]
api_key =
# model options: grok-3, grok-3-fast, grok-3-mini, grok-3-mini-fast
model = grok-3
